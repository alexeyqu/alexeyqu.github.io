    <script>
        function timeAgo(dateStr) {
            const diff = Date.now() - new Date(dateStr);
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(mins / 60);
            const days = Math.floor(hours / 24);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            if (hours < 24) return hours + 'h ago';
            return days + 'd ago';
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function fetchCommits() {
            const list = document.getElementById('commit-feed');
            try {
                const res = await fetch(
                    'https://api.github.com/search/commits?q=author:alexeyqu&sort=committer-date&order=desc&per_page=5',
                    { headers: { 'Accept': 'application/vnd.github.cloak-preview' } }
                );
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                const items = data.items || [];

                if (items.length === 0) {
                    list.innerHTML = '<li class="feed-empty">no recent public commits</li>';
                    return;
                }

                list.innerHTML = items.map(function(item) {
                    const repo = item.repository.name;
                    const repoUrl = 'https://github.com/' + item.repository.full_name;
                    const sha = item.sha.slice(0, 7);
                    const message = item.commit.message.split('\n')[0];
                    const time = item.commit.committer.date;
                    return '<li class="feed-item">' +
                        '<div class="feed-meta">' +
                            '<a href="' + repoUrl + '" target="_blank" rel="noopener noreferrer" class="feed-repo">' + escapeHtml(repo) + '</a>' +
                            '<span class="feed-sha"><a href="' + item.html_url + '" target="_blank" rel="noopener noreferrer">' + sha + '</a></span>' +
                            '<span class="feed-time">' + timeAgo(time) + '</span>' +
                        '</div>' +
                        '<p class="feed-message">' + escapeHtml(message) + '</p>' +
                    '</li>';
                }).join('');
            } catch (e) {
                list.innerHTML = '<li class="feed-empty">' + (e && e.message ? escapeHtml(e.message) : 'fetch failed') + '</li>';
                console.error(e);
            }
        }

        const facts = [
            'Makes dried orange slices as New Year gifts.',
            'Finalist at the All-Russian French Language Olympiad.',
            'Volunteered as a helpline support operator.',
            'Taught maths, Python, and compilers — 7 years across school and university.',
            'Sang in a choir for 3 years and can hold a harmony in Let It Go.',
            'Performed "Take Me to Church" by Hozier on ukulele at an open mic.',
        ];
        document.getElementById('fun-fact').textContent =
            '// ' + facts[Math.floor(Math.random() * facts.length)];

        fetchCommits();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Talks by Alex Kulikov">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <title>Talks — Alex Kulikov</title>
  <style>
    :root {
      --bg: #0A0908;
      --text: #F0EBE3;
      --muted: #918D88;
      --faint: #242220;
      --accent: #C4A472;
      --border: rgba(196, 164, 114, 0.18);
      --font-serif: 'Cormorant Garamond', 'Georgia', serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: var(--bg);
      background-image: radial-gradient(ellipse at 30% 40%, #161412 0%, #0A0908 65%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: clamp(3rem, 8vh, 6rem) clamp(2rem, 8vw, 6rem);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: var(--font-mono);
    }
    .noise {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; opacity: 0.035; z-index: 10;
    }
    .page {
      width: 100%; max-width: 680px;
      border-left: 1px solid var(--border);
      padding-left: 1.75rem;
      display: flex; flex-direction: column; gap: 2.5rem;
      animation: fadeUp 0.7s ease both;
    }
    .back {
      font-size: 0.6rem; font-weight: 300; letter-spacing: 0.1em;
      color: var(--muted); text-decoration: none;
      transition: color 0.2s ease;
    }
    .back:hover { color: var(--accent); }
    .heading {
      font-size: 0.6rem; font-weight: 300; letter-spacing: 0.12em;
      color: var(--muted); text-transform: uppercase;
    }
    .talk-list {
      list-style: none; display: flex; flex-direction: column; gap: 1.75rem;
    }
    .talk {
      border-left: 1px solid var(--faint);
      padding-left: 1rem;
      display: flex; flex-direction: column; gap: 0.4rem;
      transition: border-color 0.2s ease;
    }
    .talk:hover { border-color: var(--accent); }
    .talk-meta {
      font-size: 0.58rem; font-weight: 300; letter-spacing: 0.08em;
      color: var(--muted); opacity: 0.7;
    }
    .talk-title {
      font-family: var(--font-serif);
      font-weight: 400; font-size: 1.15rem; line-height: 1.2;
    }
    .talk-title a {
      color: var(--text); text-decoration: none;
      transition: color 0.2s ease;
    }
    .talk-title a:hover { color: var(--accent); }
    .talk-event {
      font-size: 0.6rem; font-weight: 300; letter-spacing: 0.06em;
      color: var(--muted);
    }
    .talk-event a {
      color: var(--muted); text-decoration: none;
      transition: color 0.2s ease;
    }
    .talk-event a:hover { color: var(--accent); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      body { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <svg class="noise" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>

  <main class="page">
    <a href="/" class="back">&larr; alexeyqu</a>
    <p class="heading">// talks</p>

    <ul class="talk-list">
      <li class="talk">
        <span class="talk-meta">26 May 2026</span>
        <h2 class="talk-title">
          <a href="/talks/cccl-6/">fix: replace prod password with devpass</a>
        </h2>
        <span class="talk-event"><a href="https://meetups.cccl.ai/cccl-6/agenda" target="_blank" rel="noopener noreferrer">CCCL #6 &mdash; Claude Code for Everyone</a> &middot; London &middot; ⚡ 2 min</span>
      </li>
      <li class="talk">
        <span class="talk-meta">5 March 2025</span>
        <h2 class="talk-title">
          <a href="/talks/ai-tinkerers-openclaw/">I Fed My Instagram Archive to OpenClaw and Now It Knows I Love Tiramisu</a>
        </h2>
        <span class="talk-event"><a href="https://london.aitinkerers.org/connect/mu_KfO39ws0qZ4" target="_blank" rel="noopener noreferrer">AI Tinkerers &mdash; OpenClaw Demo Night</a> &middot; London</span>
      </li>
    </ul>
  </main>
</body>
</html>

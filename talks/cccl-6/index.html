<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="fix: replace prod password with devpass — CCCL #6, 26 May 2026">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <title>fix: replace prod password with devpass — Alex Kulikov</title>
  <style>
    :root {
      --bg: #0A0908;
      --text: #F0EBE3;
      --muted: #918D88;
      --faint: #242220;
      --accent: #C4A472;
      --border: rgba(196, 164, 114, 0.18);
      --font-serif: 'Cormorant Garamond', 'Georgia', serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: var(--bg);
      background-image: radial-gradient(ellipse at 30% 40%, #161412 0%, #0A0908 65%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: clamp(3rem, 8vh, 6rem) clamp(2rem, 8vw, 6rem);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: var(--font-mono);
    }
    .noise {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; opacity: 0.035; z-index: 10;
    }
    .page {
      width: 100%; max-width: 680px;
      border-left: 1px solid var(--border);
      padding-left: 1.75rem;
      display: flex; flex-direction: column; gap: 2rem;
      animation: fadeUp 0.7s ease both;
    }
    .back {
      font-size: 0.6rem; font-weight: 300; letter-spacing: 0.1em;
      color: var(--muted); text-decoration: none;
      transition: color 0.2s ease;
    }
    .back:hover { color: var(--accent); }
    .meta {
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .event {
      font-size: 0.6rem; font-weight: 300; letter-spacing: 0.12em;
      color: var(--muted); text-transform: uppercase;
      text-decoration: none; transition: color 0.2s ease;
    }
    .event:hover { color: var(--accent); }
    .date {
      font-size: 0.6rem; font-weight: 300; letter-spacing: 0.08em;
      color: var(--muted); opacity: 0.7;
    }
    h1 {
      font-family: var(--font-mono);
      font-weight: 400; font-size: clamp(1.1rem, 3vw, 1.5rem);
      line-height: 1.2; color: var(--accent);
      letter-spacing: 0.02em;
    }
    .note {
      font-size: 0.62rem; font-weight: 300; font-style: italic;
      color: var(--muted); opacity: 0.7; letter-spacing: 0.04em;
    }
    .divider { height: 1px; background: var(--faint); }
    img {
      width: 100%; height: auto;
      border: 1px solid var(--faint);
      display: block;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      body { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <svg class="noise" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>

  <article class="page">
    <a href="/talks/" class="back">&larr; talks</a>

    <div class="meta">
      <a href="https://meetups.cccl.ai/cccl-6/agenda" target="_blank" rel="noopener noreferrer" class="event">CCCL #6 &mdash; Claude Code for Everyone</a>
      <span class="date">26 May 2026 &middot; Old Street, London</span>
    </div>

    <h1>fix: replace prod password with devpass</h1>
    <p class="note">// lightning talk</p>

    <div class="divider"></div>
    <img src="cccl.png" alt="fix: replace prod password with devpass — slide">
  </article>
</body>
</html>
